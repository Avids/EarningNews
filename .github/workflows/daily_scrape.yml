name: Daily Earnings News Scrape

on:
  schedule:
    # 22:00 UTC = 6:00 PM EST (standard time). During EDT (Mar-Nov) this
    # runs at 7:00 PM instead — GitHub Actions cron is always UTC and does
    # not shift for daylight saving. Adjust to "0 22 * * *" if you want it
    # pinned to 6:00 PM EDT during summer instead.
    - cron: "0 23 * * *"
  workflow_dispatch: {}   # allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily earnings news: $(date -u +%Y-%m-%d)"
          git push
