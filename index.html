<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earnings News Archive</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.cdnfonts.com/css/geist-sans');

  :root {
    --color-canvas: #f5f5f5;
    --color-paper: #ffffff;
    --color-surface-alt: #fafafa;
    --color-ink: #0a0a0a;
    --color-ink-soft: #171717;
    --color-mid-gray: #737373;
    --color-hairline: #e5e5e5;
    --color-ember: #e7000b;
    --color-success: #10b981;
    --color-error: #f43f5e;
    --font-geist: 'Geist', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --shadow-subtle: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: var(--font-geist);
    background: var(--color-canvas);
    color: var(--color-ink);
    font-size: 14px;
    line-height: 1.43;
    font-feature-settings: "ss01" on, "cv11" on;
  }

  header {
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 24px 24px;
    position: relative;
  }
  header h1 {
    margin: 0 0 8px;
    font-size: 36px;
    font-weight: 600;
    line-height: 1.11;
    letter-spacing: -0.9px;
  }
  header p {
    margin: 0;
    color: var(--color-mid-gray);
    font-size: 14px;
  }

  .layout {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 24px 48px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  @media (max-width: 768px) {
    .layout {
      flex-direction: column;
    }
    nav {
      width: 100% !important;
      display: flex;
      overflow-x: auto;
      white-space: nowrap;
      padding: 8px;
    }
    nav button {
      display: inline-block !important;
      width: auto !important;
      margin-bottom: 0 !important;
      margin-right: 8px;
    }
  }

  nav {
    width: 220px;
    flex-shrink: 0;
    background: var(--color-surface-alt);
    border: 1px solid var(--color-hairline);
    border-radius: 24px;
    padding: 8px;
  }
  nav button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 8px 12px;
    margin-bottom: 2px;
    background: none;
    border: none;
    border-radius: 18px;
    color: var(--color-ink);
    cursor: pointer;
    font-family: var(--font-geist);
    font-size: 14px;
    font-weight: 500;
  }
  nav button:hover { background: var(--color-canvas); }
  nav button.active { background: var(--color-ink); color: var(--color-surface-alt); }

  main { flex: 1; min-width: 0; }

  .card {
    background: var(--color-paper);
    border: 1px solid var(--color-hairline);
    border-radius: 24px;
    box-shadow: var(--shadow-subtle);
    padding: 20px;
    overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--color-mid-gray);
    border-bottom: 1px solid var(--color-hairline);
  }
  td {
    padding: 12px;
    border-bottom: 1px solid var(--color-hairline);
    vertical-align: top;
  }
  tr.row-main { cursor: pointer; transition: background-color 0.2s ease; }
  tr.row-main:hover td { background-color: var(--color-surface-alt); }
  tr:last-child td { border-bottom: none; }
  th.num-cell, td.num-cell { text-align: right; }

  .badge {
    display: inline-block;
    background: var(--color-ink-soft);
    color: #fafafa;
    border-radius: 18px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge-success {
    display: inline-block;
    background: var(--color-success);
    color: #ffffff;
    border-radius: 18px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge-error {
    display: inline-block;
    background: var(--color-error);
    color: #ffffff;
    border-radius: 18px;
    padding: 2px 8px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge-neutral {
    display: inline-block;
    background: var(--color-canvas);
    color: var(--color-ink-soft);
    border-radius: 18px;
    padding: 1px 7px;
    font-size: 12px;
    font-weight: 500;
  }
  .surprise-cell { display: flex; gap: 6px; flex-wrap: wrap; }
  .name { color: var(--color-ink); }
  .muted { color: var(--color-mid-gray); }

  .row-summary td { background: var(--color-surface-alt); border-radius: 10px; }
  .detail-subject {
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 16px;
    letter-spacing: -0.25px;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px 24px;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--color-hairline);
  }
  .stat { display: flex; justify-content: space-between; font-size: 13px; }
  .stat-label { color: var(--color-mid-gray); }
  .stat-value { font-weight: 600; color: var(--color-ink); }
  .summary-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--color-ink-soft);
  }

  .empty {
    color: var(--color-mid-gray);
    padding: 48px 0;
    text-align: center;
    font-size: 14px;
  }
  .nav-empty { padding: 8px 12px; color: var(--color-mid-gray); font-size: 13px; }

  .search-container {
    margin-top: 24px;
  }
  #searchInput {
    width: 100%;
    max-width: 400px;
    padding: 10px 16px;
    border: 1px solid var(--color-hairline);
    border-radius: 8px;
    font-family: var(--font-geist);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #searchInput:focus {
    border-color: var(--color-ink);
  }

  #copyBtn {
    padding: 10px 16px;
    border: 1px solid var(--color-hairline);
    border-radius: 8px;
    font-family: var(--font-geist);
    font-size: 14px;
    background: var(--color-paper);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
    transition: all 0.2s;
  }
  #copyBtn:hover {
    background: var(--color-ink);
    color: var(--color-surface-alt);
    border-color: var(--color-ink);
  }
</style>
</head>
<body>

<header>
  <h1>Earnings News Archive</h1>
  <p>Daily snapshots pulled from Earnings Whispers</p>
  <div class="search-container" style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
    <input type="text" id="searchInput" placeholder="Search by ticker or name..." />
    <button id="copyBtn" onclick="copyScreenshot()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      Copy Screenshot
    </button>
  </div>
</header>

<div class="layout">
  <nav id="dateNav"><div class="nav-empty">Loading dates…</div></nav>
  <main>
    <div class="card" id="content"><div class="empty">Select a date</div></div>
  </main>
</div>

<script>
const DATA_DIR = "data";
let currentItems = [];

async function loadManifest() {
  const res = await fetch(`${DATA_DIR}/manifest.json?_t=${Date.now()}`, { cache: "no-store" });
  if (!res.ok) throw new Error("manifest.json not found");
  return res.json();
}

async function loadDay(date) {
  const res = await fetch(`${DATA_DIR}/earnings_news_${date}.json?_t=${Date.now()}`, { cache: "no-store" });
  if (!res.ok) throw new Error(`No data for ${date}`);
  return res.json();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function formatSummary(summary) {
  if (!summary) return "";
  return escapeHtml(summary).replace(/&lt;br\s*\/?&gt;/gi, "<br>");
}

function fmtPct(x) {
  return (x === null || x === undefined) ? "-" : `${(x * 100).toFixed(2)}%`;
}

function fmtNum(x, decimals = 2, currency = false) {
  if (x === null || x === undefined) return "-";
  const num = Number(x);
  const formatted = num.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  return currency ? `$${formatted}` : formatted;
}

// Threshold below which a surprise counts as "in line" rather than beat/miss.
const INLINE_THRESHOLD = 0.005; // 0.5%

function surpriseBadge(label, value) {
  if (value === null || value === undefined) return "";
  let symbol, cls, word;
  if (value > INLINE_THRESHOLD) { symbol = "▲"; cls = "badge-success"; word = "Beat"; }
  else if (value < -INLINE_THRESHOLD) { symbol = "▼"; cls = "badge-error"; word = "Miss"; }
  else { symbol = "▬"; cls = "badge-neutral"; word = "In line"; }
  return `<span class="${cls}" title="${label}: ${word} (${fmtPct(value)})">${symbol} ${label}</span>`;
}

// Guidance field name varies by feed; check the common possibilities.
// Expected convention (adjust if the real field differs): positive number/
// "raised"/"above" = better guidance, negative/"lowered"/"below" = worse,
// "reaffirmed"/"in-line"/0 = in line.
function guidanceBadge(item) {
  const raw = item.guidance ?? item.guidanceDirection ?? item.outlook ?? null;
  if (raw === null || raw === undefined || raw === "") return "";
  let symbol, cls, word;
  const s = String(raw).toLowerCase();
  if (typeof raw === "number") {
    if (raw > 0) { symbol = "▲"; cls = "badge-success"; word = "Raised"; }
    else if (raw < 0) { symbol = "▼"; cls = "badge-error"; word = "Lowered"; }
    else { symbol = "▬"; cls = "badge-neutral"; word = "Reaffirmed"; }
  } else if (/raise|above|better|beat/.test(s)) { symbol = "▲"; cls = "badge-success"; word = "Raised"; }
  else if (/lower|below|worse|cut/.test(s)) { symbol = "▼"; cls = "badge-error"; word = "Lowered"; }
  else { symbol = "▬"; cls = "badge-neutral"; word = "Reaffirmed"; }
  return `<span class="${cls}" title="Guidance: ${word}">${symbol} Guidance</span>`;
}

function surpriseCell(item) {
  const parts = [
    surpriseBadge("EPS", item.earningsSurprise),
    surpriseBadge("Rev", item.revenueSurprise),
    guidanceBadge(item),
  ].filter(Boolean);
  return parts.length ? `<div class="surprise-cell">${parts.join("")}</div>` : `<span class="muted">-</span>`;
}

function statRow(label, value) {
  if (value === "-") return "";
  return `<div class="stat"><span class="stat-label">${label}</span><span class="stat-value">${value}</span></div>`;
}

function renderDetail(item) {
  const stats = [
    statRow("EPS (reported)", fmtNum(item.eps)),
    statRow("EPS estimate", fmtNum(item.estimate)),
    statRow("EPS range", (item.lowEstimate != null && item.highEstimate != null) ? `${fmtNum(item.lowEstimate)} – ${fmtNum(item.highEstimate)}` : "-"),
    statRow("Whisper number", fmtNum(item.whisper)),
    statRow("Earnings surprise", fmtPct(item.earningsSurprise)),
    statRow("Earnings growth (YoY)", fmtPct(item.earningsGrowth)),
    statRow("Revenue (reported, $M)", fmtNum(item.revenue, 3, true)),
    statRow("Revenue estimate ($M)", fmtNum(item.revenueEstimate, 3, true)),
    statRow("Revenue surprise", fmtPct(item.revenueSurprise)),
    statRow("Revenue growth (YoY)", fmtPct(item.revenueGrowth)),
    statRow("Quarter", item.quarter ?? "-"),
    statRow("EW Grade", item.ewGrade ?? "-"),
    statRow("Power Rating", item.pwrRating ?? "-"),
  ].join("");

  return `
    <div class="detail-subject">${item.subject ?? ""}</div>
    <div class="stats-grid">${stats}</div>
    <div class="summary-text">${formatSummary(item.summary)}</div>
  `;
}

function renderTable(items) {
  if (!items.length) {
    return `<div class="empty">No items for this date.</div>`;
  }
  const rows = items.map((item, i) => `
    <tr class="row-main" data-idx="${i}">
      <td><span class="badge">${item.ticker ?? "-"}</span></td>
      <td class="name">${item.name ?? "-"}</td>
      <td>${surpriseCell(item)}</td>
      <td class="num-cell">${fmtNum(item.eps)}</td>
      <td class="num-cell">${fmtNum(item.revenue, 3, true)}</td>
      <td class="num-cell">${fmtPct(item.earningsGrowth)}</td>
      <td class="num-cell">${fmtPct(item.revenueGrowth)}</td>
      <td>${item.quarter ?? "-"}</td>
    </tr>
    <tr class="row-summary" id="summary-${i}" style="display: none;">
      <td colspan="8">${renderDetail(item)}</td>
    </tr>
  `).join("");
  return `
    <table>
      <thead><tr><th>Ticker</th><th>Name</th><th>Surprise / Guidance</th><th class="num-cell">EPS (reported)</th><th class="num-cell">Revenue (reported, $M)</th><th class="num-cell">Earnings growth (YoY)</th><th class="num-cell">Revenue growth (YoY)</th><th>Quarter</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function attachRowToggles() {
  document.querySelectorAll(".row-main").forEach(row => {
    row.addEventListener("click", () => {
      const summaryRow = document.getElementById(`summary-${row.dataset.idx}`);
      if (summaryRow) {
        summaryRow.style.display = summaryRow.style.display === "none" ? "table-row" : "none";
      }
    });
  });
}

let activeDateStr = null;

async function selectDate(date, btn) {
  activeDateStr = date;
  document.querySelectorAll("#dateNav button").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  const content = document.getElementById("content");
  content.innerHTML = `<div class="empty">Loading ${date}…</div>`;
  try {
    currentItems = await loadDay(date);
    renderCurrentItems();
  } catch (e) {
    content.innerHTML = `<div class="empty">Failed to load ${date}: ${e.message}</div>`;
    currentItems = [];
  }
}

function renderCurrentItems() {
  const content = document.getElementById("content");
  const query = document.getElementById("searchInput").value.toLowerCase();
  
  let filtered = currentItems;
  if (query) {
    filtered = currentItems.filter(item => 
      (item.ticker && item.ticker.toLowerCase().includes(query)) ||
      (item.name && item.name.toLowerCase().includes(query))
    );
  }
  
  content.innerHTML = renderTable(filtered);
  attachRowToggles();
}

document.getElementById("searchInput").addEventListener("input", renderCurrentItems);

async function init() {
  const nav = document.getElementById("dateNav");
  try {
    const dates = await loadManifest();
    if (!dates.length) {
      nav.innerHTML = `<div class="nav-empty">No data yet</div>`;
      return;
    }
    nav.innerHTML = "";
    dates.forEach((date, i) => {
      const btn = document.createElement("button");
      btn.textContent = date;
      btn.onclick = () => selectDate(date, btn);
      nav.appendChild(btn);
      if (activeDateStr === date) {
        btn.classList.add("active");
      }
    });
    
    if (!activeDateStr && dates.length > 0) {
      // First load, select the most recent date
      const firstBtn = nav.querySelector("button");
      selectDate(dates[0], firstBtn);
    } else if (activeDateStr && dates.includes(activeDateStr)) {
      // Reload current date data to ensure it's fresh
      selectDate(activeDateStr, Array.from(nav.querySelectorAll("button")).find(b => b.textContent === activeDateStr));
    }
  } catch (e) {
    nav.innerHTML = `<div class="nav-empty">Failed to load manifest: ${e.message}</div>`;
  }
}

// Initialize on page load
init();

// Auto-refresh every 5 minutes to fetch new data automatically
setInterval(() => {
  init();
}, 5 * 60 * 1000);

async function copyScreenshot() {
  const contentCard = document.getElementById("content");
  const copyBtn = document.getElementById("copyBtn");
  
  // Visual feedback
  const originalText = copyBtn.innerHTML;
  copyBtn.disabled = true;
  copyBtn.innerHTML = "Capturing...";

  // Create a temporary container so we don't mess up the layout style of the original card
  const tempHeader = document.createElement("div");
  tempHeader.style.paddingBottom = "16px";
  tempHeader.style.marginBottom = "16px";
  tempHeader.style.borderBottom = "1px solid var(--color-hairline)";
  tempHeader.style.fontFamily = "var(--font-geist)";
  tempHeader.style.textAlign = "center";
  
  const title = document.createElement("div");
  title.textContent = "Earning Reports";
  title.style.fontSize = "20px";
  title.style.fontWeight = "600";
  title.style.color = "var(--color-ink)";
  title.style.letterSpacing = "-0.5px";
  
  const dateSub = document.createElement("div");
  dateSub.textContent = activeDateStr || "";
  dateSub.style.fontSize = "13px";
  dateSub.style.color = "var(--color-mid-gray)";
  dateSub.style.marginTop = "4px";
  
  tempHeader.appendChild(title);
  tempHeader.appendChild(dateSub);
  
  // Prepend to card
  contentCard.insertBefore(tempHeader, contentCard.firstChild);
  
  try {
    const canvas = await html2canvas(contentCard, {
      backgroundColor: "#ffffff",
      logging: false,
      useCORS: true,
      scale: 2 // Higher quality screenshot
    });
    
    canvas.toBlob(async (blob) => {
      try {
        await navigator.clipboard.write([
          new ClipboardItem({ "image/png": blob })
        ]);
        copyBtn.innerHTML = "Copied!";
        setTimeout(() => {
          copyBtn.disabled = false;
          copyBtn.innerHTML = originalText;
        }, 2000);
      } catch (err) {
        console.error("Clipboard write failed", err);
        alert("Clipboard access denied. Please try again or check browser permissions.");
        copyBtn.disabled = false;
        copyBtn.innerHTML = originalText;
      }
    }, "image/png");
  } catch (err) {
    console.error("Screenshot capture failed", err);
    alert("Failed to capture screenshot.");
    copyBtn.disabled = false;
    copyBtn.innerHTML = originalText;
  } finally {
    // Clean up temporary header
    if (tempHeader.parentNode === contentCard) {
      contentCard.removeChild(tempHeader);
    }
  }
}

</script>

</body>
</html>
