<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earnings News Archive</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --border: #2a2e38;
    --text: #e6e8eb;
    --muted: #9aa1ac;
    --accent: #4f8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0 0 0.25rem; font-size: 1.4rem; }
  header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
  .layout {
    display: flex;
    min-height: calc(100vh - 90px);
  }
  nav {
    width: 220px;
    border-right: 1px solid var(--border);
    padding: 1rem 0;
    overflow-y: auto;
  }
  nav button {
    display: block;
    width: 100%;
    text-align: left;
    padding: 0.6rem 1.25rem;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    font-size: 0.9rem;
  }
  nav button:hover { background: var(--panel); }
  nav button.active { background: var(--panel); color: var(--accent); font-weight: 600; }
  main {
    flex: 1;
    padding: 1.5rem 2rem;
    overflow-y: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  th, td {
    text-align: left;
    padding: 0.6rem 0.8rem;
    border-bottom: 1px solid var(--border);
  }
  th { color: var(--muted); font-weight: 600; }
  tr:hover { background: var(--panel); }
  .row-main { cursor: pointer; }
  .row-summary td { background: #10131a; }
  .summary { padding: 1rem 1.5rem; }
  .subject { font-weight: 600; margin-bottom: 0.75rem; font-size: 0.95rem; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0.4rem 1.5rem;
    margin-bottom: 1rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .stat { display: flex; justify-content: space-between; font-size: 0.85rem; }
  .stat-label { color: var(--muted); }
  .stat-value { font-weight: 600; }
  .summary-text {
    white-space: normal;
    line-height: 1.5;
    color: var(--text);
    font-size: 0.88rem;
  }
  .ticker { font-weight: 600; color: var(--accent); }
  .muted { color: var(--muted); }
  .empty { color: var(--muted); padding: 2rem 0; }
</style>
</head>
<body>

<header>
  <h1>Earnings News Archive</h1>
  <p>Daily snapshots pulled from Earnings Whispers</p>
</header>

<div class="layout">
  <nav id="dateNav"><div class="muted" style="padding: 0.6rem 1.25rem;">Loading dates…</div></nav>
  <main id="content"><div class="empty">Select a date</div></main>
</div>

<script>
const DATA_DIR = "data";

async function loadManifest() {
  const res = await fetch(`${DATA_DIR}/manifest.json`, { cache: "no-store" });
  if (!res.ok) throw new Error("manifest.json not found");
  return res.json();
}

async function loadDay(date) {
  const res = await fetch(`${DATA_DIR}/earnings_news_${date}.json`, { cache: "no-store" });
  if (!res.ok) throw new Error(`No data for ${date}`);
  return res.json();
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function formatSummary(summary) {
  if (!summary) return "";
  // Escape everything, then restore just <br> line breaks from the source.
  return escapeHtml(summary).replace(/&lt;br\s*\/?&gt;/gi, "<br>");
}

function fmtPct(x) {
  return (x === null || x === undefined) ? "-" : `${(x * 100).toFixed(2)}%`;
}

function fmtNum(x, decimals = 2) {
  return (x === null || x === undefined) ? "-" : Number(x).toFixed(decimals);
}

function statRow(label, value) {
  if (value === "-" ) return "";
  return `<div class="stat"><span class="stat-label">${label}</span><span class="stat-value">${value}</span></div>`;
}

function renderDetail(item) {
  const stats = [
    statRow("EPS (actual)", fmtNum(item.eps)),
    statRow("EPS estimate", fmtNum(item.estimate)),
    statRow("EPS range", (item.lowEstimate != null && item.highEstimate != null) ? `${fmtNum(item.lowEstimate)} – ${fmtNum(item.highEstimate)}` : "-"),
    statRow("Whisper number", fmtNum(item.whisper)),
    statRow("Earnings surprise", fmtPct(item.earningsSurprise)),
    statRow("Earnings growth (YoY)", fmtPct(item.earningsGrowth)),
    statRow("Revenue (actual, $M)", fmtNum(item.revenue, 3)),
    statRow("Revenue estimate ($M)", fmtNum(item.revenueEstimate, 3)),
    statRow("Revenue surprise", fmtPct(item.revenueSurprise)),
    statRow("Revenue growth (YoY)", fmtPct(item.revenueGrowth)),
    statRow("Quarter", item.quarter ?? "-"),
    statRow("EW Grade", item.ewGrade ?? "-"),
    statRow("Power Rating", item.pwrRating ?? "-"),
  ].join("");

  return `
    <div class="subject">${item.subject ?? ""}</div>
    <div class="stats-grid">${stats}</div>
    <div class="summary-text">${formatSummary(item.summary)}</div>
  `;
}

function renderTable(items) {
  if (!items.length) {
    return `<div class="empty">No items for this date.</div>`;
  }
  const rows = items.map((item, i) => `
    <tr class="row-main" data-idx="${i}">
      <td class="ticker">${item.ticker ?? "-"}</td>
      <td>${item.name ?? "-"}</td>
      <td class="muted">${item.epsDate ?? "-"}</td>
    </tr>
    <tr class="row-summary" id="summary-${i}" style="display: none;">
      <td colspan="3" class="summary">${renderDetail(item)}</td>
    </tr>
  `).join("");
  return `
    <table>
      <thead><tr><th>Ticker</th><th>Name</th><th>Reported</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function attachRowToggles() {
  document.querySelectorAll(".row-main").forEach(row => {
    row.addEventListener("click", () => {
      const summaryRow = document.getElementById(`summary-${row.dataset.idx}`);
      if (summaryRow) {
        summaryRow.style.display = summaryRow.style.display === "none" ? "table-row" : "none";
      }
    });
  });
}

async function selectDate(date, btn) {
  document.querySelectorAll("#dateNav button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  const content = document.getElementById("content");
  content.innerHTML = `<div class="empty">Loading ${date}…</div>`;
  try {
    const items = await loadDay(date);
    content.innerHTML = renderTable(items);
    attachRowToggles();
  } catch (e) {
    content.innerHTML = `<div class="empty">Failed to load ${date}: ${e.message}</div>`;
  }
}

async function init() {
  const nav = document.getElementById("dateNav");
  try {
    const dates = await loadManifest();
    if (!dates.length) {
      nav.innerHTML = `<div class="muted" style="padding: 0.6rem 1.25rem;">No data yet</div>`;
      return;
    }
    nav.innerHTML = "";
    dates.forEach((date, i) => {
      const btn = document.createElement("button");
      btn.textContent = date;
      btn.onclick = () => selectDate(date, btn);
      nav.appendChild(btn);
      if (i === 0) selectDate(date, btn);
    });
  } catch (e) {
    nav.innerHTML = `<div class="muted" style="padding: 0.6rem 1.25rem;">Failed to load manifest: ${e.message}</div>`;
  }
}

init();
</script>

</body>
</html>
